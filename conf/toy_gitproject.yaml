defaults:
  - config
  - _self_

run_name: toy_gitproject
data:
  _target_: spase_cache.datasets.git_project.GitProjectDataset
  name: git_project
  format: revision
  raw_dir: data/git_project
  processed: data/git_project_${run_name}.parquet
  max_seq_len: 16384
  min_seq_len: 1
  max_revisions: 1000
  max_rows: 1000
  interleave: false
  train_frac: 0.5
  skip_fetch: false
  fetch:
    repo_dir: "."
    extensions:
      - ".py"

benchmark_baselines:
  seq_lens: [1024, 2048, 4096, 8192, 16384]

benchmark_e2e:
  kv_budget_gb: 1.0
  gdn_budget_gb: 1.0
  warmup_seqs: 10
  progress: true
