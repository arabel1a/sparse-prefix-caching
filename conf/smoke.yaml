overwrite: True

defaults:
  - config
  - _self_

run_name: smoke
data:
  max_convs: 1
  max_rows: 4
  max_requests: 8
  max_seq_len: 8192

benchmark_baselines:
  seq_lens: [128, 256, 512, 1024]

cache_manager:
  _target_: sparse_prefix_caching.utils.FixedSizeCache
  max_cached_sequences: 1
  kv_budget_gb: 0.2
  gdn_budget_gb: 0.2
