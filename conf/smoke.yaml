overwrite: True

defaults:
  - config
  - _self_

run_name: smoke
data:
  max_rows: 4
  max_requests: 8
  max_seq_len: 1000

strategies:
  - no_cache   # do not delete this strat - code assumes that it is used
  - kv_only
  - balanced
  - block
  - log
  - hist_frozen
  - hist_exp_decay

benchmark_baselines:
  seq_lens: [128, 256, 512, 1024]

benchmark_e2e:
  kv_budget_gb: 0.2
  gdn_budget_gb: 0.2
