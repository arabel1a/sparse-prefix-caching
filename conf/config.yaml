run_name: full
output_dir: outputs/${run_name}
overwrite: False
log_level: WARNING   # DEBUG, INFO, WARNING, ERROR

device: mps  # cpu, cuda, mps
dtype: float16  # enable 2080's tensor cores
seed: 42

hydra:
  run:
    dir: ${output_dir}
  output_subdir: hydra  # saves hydra config into ${output_dir}/hydra/

data:
  raw_path: data/chatgpt_results_final_language_filtered.csv
  processed: data/tokenized.parquet
  max_seq_len: 16384 # maximum request length
  min_seq_len: 768   # all strategies are anyway disabled for too short promts -- waste of compute for experiments
  max_rounds: 36 # there are few sequences of very many rounds (up to 800), which bloats the number of requests (quadratic amount of total token). I filter 95th percentile
  max_rows: 1000000
  interleave: true  # interleave conversations with Poisson arrivals for realistic cache miss patterns
  train_frac: 0.5   # fraction of requests used for cache warmup (train); rest is test

strategies:
  - tag: "no_cache"
    type: "no_cache"
    label: "No caching"
    color: "black"
    marker: "o"
    linestyle: "-"
    linewidth: 2

  - tag: "kv_only"
    type: "kv_only"
    label: "KV cache only"
    color: "tab:red"
    marker: "s"
    linestyle: "-"
    linewidth: 2

  - tag: "block_768"
    type: "balanced_fix_blocksize"
    block_size: 768
    label: "Block (B=768)"
    color: "tab:blue"
    marker: "^"
    linestyle: "-"
    linewidth: 1.5

  - tag: "balanced_1"
    type: "balanced_fix_nblocks"
    n_blocks: 1
    label: "Balanced (1 block)"
    color: "tab:cyan"
    marker: "D"
    linestyle: "-"
    linewidth: 1.5
    skip: 768

    # skipped: i cant afford such context lengths
#   - tag: "sqrt"
#     type: "sqrt"
#     label: "Sqrt"
#     color: "tab:green"
#     marker: "p"
#     linestyle: "-"
#     linewidth: 2
#     skip: 768 * 768
#
  - tag: "log_768"
    type: "diadic"
    label: "Logarithmic (starting at 768)"
    color: "tab:orange"
    marker: "v"
    linestyle: "-"
    linewidth: 2
    startat: 768

  - tag: "hist_frozen"
    type: "histogram_frozen"
    n_blocks: 1
    label: "DP-optimal (frozen)"
    color: "tab:purple"
    marker: "X"
    linestyle: "-"
    linewidth: 2

  - tag: "hist_periodic"
    type: "histogram_periodic"
    n_blocks: 1
    label: "DP-optimal (periodic H=100)"
    color: "tab:brown"
    marker: "P"
    linestyle: "--"
    linewidth: 2
    replan_interval: 100

  - tag: "hist_exp_decay"
    type: "histogram_exp_decay"
    n_blocks: 1
    label: "DP-optimal (exp decay γ=0.99)"
    color: "tab:olive"
    marker: "*"
    linestyle: "--"
    linewidth: 2
    gamma: 0.99
    replan_interval: 100


# Qwen3.5-0.8B dimensions
model:
  name: "Qwen3.5-0.8B"
  tokenizer: "Qwen/Qwen3.5-0.8B"
  gdn_layers: 3
  ga_layers: 1
  # HF-compatible fields (for checkpoint_cache.py, single layer group)
  vocab_size: 512        # for original qwen vocab, most logits take too much memory
  hidden_size: 1024         # = d
  intermediate_size: 3584   # = d_ff
  num_hidden_layers: 4      # 1 group = 3 GDN + 1 attn
  num_attention_heads: 8    # = a_nq
  num_key_value_heads: 2    # = a_nkv
  head_dim: 256             # = d_a
  linear_conv_kernel_dim: 4
  linear_key_head_dim: 128  # = d_h
  linear_value_head_dim: 128 # = d_h
  linear_num_key_heads: 16  # = gdn_nqk
  linear_num_value_heads: 16 # = gdn_nv
  max_position_embeddings: 262144
  rope_theta: 10000000.0
  r: 768

test:
  seq_len: 100
  tolerance: 1.0e-3

benchmark_baselines:
  seq_lens: [1023, 1024, 1536, 2047, 2048, 3072, 4095, 4096, 6144, 8191, 8192, 16383, 16384, 20000]
  n_runs: 3

benchmark_e2e:
  kv_budget_gb: 5.0
  gdn_budget_gb: 5.0
  warmup_seqs: 1000
  progress: true

overlap_distribution:
  batch_size: 5000

prepare_data:
  _target_: prepare_data.prepare_all  # or prepare_data.tokenize, prepare_data.compute_overlap
  tokenizer_chunk_size: 2048

plot_results:
  _target_: plot_results.plot_all  # or plot_results.plot_single, plot_results.plot_tradeoff, plot_results.plot_e2e, plot_results.plot_overlap
