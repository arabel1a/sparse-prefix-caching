defaults:
  - config
  - _self_

# Theoretical analysis dimensions (for plot_flops_cache.py)
model:
  name: "Qwen3.5-27B"
  tokenizer: "Qwen/Qwen3.5-27B"
  gdn_layers: 3
  ga_layers: 1
  # HF-compatible fields (for checkpoint_cache.py, single layer group)
  vocab_size: 151936        # real Qwen3.5 vocab size
  hidden_size: 5120         # = d
  intermediate_size: 17408  # = d_ff
  num_hidden_layers: 4      # 1 group = 3 GDN + 1 attn
  num_attention_heads: 24   # = a_nq
  num_key_value_heads: 4    # = a_nkv
  head_dim: 256             # = d_a
  linear_conv_kernel_dim: 4
  linear_key_head_dim: 128  # = d_h
  linear_value_head_dim: 128 # = d_h
  linear_num_key_heads: 16  # = gdn_nqk
  linear_num_value_heads: 48 # = gdn_nv
  max_position_embeddings: 32768
  rope_theta: 10000.0

memory_analysis:
  out: assets/flops_and_cache_size_27b.png

plot_benchmark:
  seq_lens: [1023, 1024, 1536, 2047, 2048, 3072, 4095, 4096]
  output: assets/empirical_latency_and_cache_27b.png
