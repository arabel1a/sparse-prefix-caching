defaults:
  - base
  - _self_

_target_: sparse_prefix_caching.datasets.revisions.GitHubDataset
name: github
format: revision
raw_dir: data/github
processed: data/github_${run_name}.parquet
max_revisions: 20    # max revisions per file (50-100 range)
skip_fetch: True # false

fetch:
  clone_dir: data/github      # null = temp dir
  min_commits: 50
  max_commits: 100
  min_words: 2000
  max_words: 6000
  targets_file: conf/data/github_targets.yaml  # generated by scripts/discover_github_files.py
  timeout: 120
