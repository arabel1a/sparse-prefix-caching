defaults:
  - _self_
  - base

_target_: spase_cache.datasets.github.GitHubDataset
name: github
format: revision
raw_dir: data/github
processed: data/github_${run_name}.parquet
max_revisions: 100    # max revisions per file (50-100 range)
min_seq_len: 8192     # drop revisions shorter than 8K tokens
skip_fetch: True # false
avg_req_len: 10000

fetch:
  clone_dir: data/github      # null = temp dir
  min_commits: 50
  max_commits: 100
  min_words: 2000
  max_words: 6000
  targets_file: conf/data/github_targets.yaml  # generated by scripts/discover_github_files.py
  timeout: 120
