defaults:
  - _self_
  - base

_target_: spase_cache.datasets.wikipedia.WikipediaDataset
name: wikipedia
format: revision
raw_dir: data/wikipedia
processed: data/wikipedia_${run_name}.parquet
max_revisions: 500    # max revisions per article
skip_fetch: True # false

fetch:
  max_revisions: 500
  min_words: 6000
  articles:
    - "United States"
    - "World War II"
    - "Climate change"
    - "Python (programming language)"
    - "Russia"
    - "History of China"
    - "Evolution"
    - "Solar System"
    - "Roman Empire"
    - "Machine learning"
