defaults:
  - _self_
  - base

_target_: spase_cache.datasets.git_project.GitProjectDataset
name: git_project
format: revision
raw_dir: data/git_project
processed: data/git_project_${run_name}.parquet
max_revisions: 1000   # max commits to process
skip_fetch: false

fetch:
  repo_dir: "."        # repository to snapshot
  extensions:
    - ".py"
