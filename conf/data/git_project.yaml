format: revision
raw_dir: dataset/git_project
processed: data/git_project_${run_name}.parquet
max_seq_len: 16384
min_seq_len: 768
max_revisions: 1000   # max commits to process
max_rows: 1000000
interleave: true
train_frac: 0.5
skip_fetch: false

fetch:
  repo_dir: "."        # repository to snapshot
  extensions:
    - ".py"
