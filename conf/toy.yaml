overwrite: True

defaults:
  - config
  - _self_

run_name: toy
data:
  interleave: false
  max_rows: 100
  max_requests: 100
  max_convs: 10

benchmark_baselines:
  seq_lens: [128, 256]

cache_manager:
  _target_: sparse_prefix_caching.utils.FixedSizeCache
  max_cached_sequences: 5
 
benchmark_e2e:
  warmup_seqs: 10
